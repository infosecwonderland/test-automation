name: Test Automation Pipeline

on:
  push:
    branches:
      - main
      - master
      - "feature/**"
      - "**/feature/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Runtimes ────────────────────────────────────────────────────────────

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      # ── Dependencies ────────────────────────────────────────────────────────

      - name: Install SUT dependencies
        run: cd sut && npm install

      - name: Install Playwright dependencies
        working-directory: ui-tests/playwright
        run: |
          npm install
          npx playwright install --with-deps

      - name: Install PyTest dependencies
        working-directory: api-tests/pytest
        run: pip install -r requirements.txt

      - name: Install Security Test dependencies
        working-directory: security-tests/Pytest
        run: pip install -r requirements.txt

      - name: Install Semgrep
        run: pip install semgrep

      # ── Start SUT (shared across all test suites) ───────────────────────────

      - name: Start SUT
        run: |
          node sut/index.js &
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "SUT is ready on port 3000"
              break
            fi
            echo "Waiting for SUT (attempt $i)..."
            sleep 1
          done

      # ── Test Suites ─────────────────────────────────────────────────────────

      - name: SAST (Semgrep)
        run: |
          semgrep scan \
            --config p/nodejs \
            --config p/jwt \
            --config security-tests/semgrep/semgrep.yml \
            --json \
            --output security-tests/semgrep/results.json \
            sut/ || true
          python3 security-tests/semgrep/convert_to_allure.py \
            security-tests/semgrep/results.json \
            security-tests/semgrep/allure-results

      - name: UI Tests (Playwright)
        working-directory: ui-tests/playwright
        run: npx playwright test

      - name: API Tests (PyTest)
        working-directory: api-tests/pytest
        run: python -m pytest -v --alluredir=allure-results

      - name: API Tests (Karate)
        working-directory: api-tests/karate
        run: mvn test -B

      - name: API Tests (Newman)
        run: |
          npm install -g newman newman-reporter-allure
          newman run api-tests/newman/ecommerce-api.postman_collection.json \
            --environment api-tests/newman/local.postman_environment.json \
            --reporters cli,allure \
            --reporter-allure-export api-tests/newman/allure-results

      - name: Security Tests
        working-directory: security-tests/Pytest
        run: python -m pytest -v --alluredir=allure-results

      # ── Stop SUT ─────────────────────────────────────────────────────────────

      - name: Stop SUT
        if: always()
        run: pkill -f "node sut/index.js" || true

      # ── Allure Reporting ──────────────────────────────────────────────────────

      - name: Install Allure CLI
        if: always()
        run: |
          wget -q https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz \
            -O /tmp/allure.tgz
          tar -xzf /tmp/allure.tgz -C /opt
          echo "/opt/allure-2.27.0/bin" >> $GITHUB_PATH

      - name: Merge Allure results
        if: always()
        run: |
          mkdir -p reports/allure/results
          cp -r ui-tests/playwright/allure-results/.    reports/allure/results/ 2>/dev/null || true
          cp -r api-tests/pytest/allure-results/.       reports/allure/results/ 2>/dev/null || true
          cp -r api-tests/karate/target/allure-results/. reports/allure/results/ 2>/dev/null || true
          cp -r api-tests/newman/allure-results/.        reports/allure/results/ 2>/dev/null || true
          cp -r security-tests/Pytest/allure-results/.  reports/allure/results/ 2>/dev/null || true
          cp -r security-tests/semgrep/allure-results/. reports/allure/results/ 2>/dev/null || true

      - name: Generate Allure HTML report
        if: always()
        run: allure generate reports/allure/results --clean -o reports/allure/html

      - name: Upload Allure report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: reports/allure/html/
          retention-days: 30

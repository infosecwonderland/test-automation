name: Minimal Linting and SUT Startup

on:
  push:
    branches:
      - main
      - master
      - "**/feature/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lint_and_requirements:
    name: Linting and Install Requirements
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python requirements (if any)
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "No top-level requirements.txt found; skipping global Python deps."
          fi

      - name: Install SUT dependencies
        run: |
          if [ -d "sut" ] && [ -f "sut/package.json" ]; then
            cd sut
            npm install
          else
            echo "No Node-based SUT with package.json found; skipping npm install."
          fi

  start_sut:
    name: Start SUT only
    runs-on: ubuntu-latest
    needs: lint_and_requirements

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SUT dependencies
        run: |
          if [ -d "sut" ] && [ -f "sut/package.json" ]; then
            cd sut
            npm install
          else
            echo "No Node-based SUT with package.json found; cannot start SUT."
          fi

      - name: Start SUT
        run: |
          if [ -d "sut" ] && [ -f "sut/package.json" ]; then
            cd sut
            npm start &
          else
            echo "No Node-based SUT found; skipping start."
          fi

      - name: Wait for SUT to be ready
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:3000/ >/dev/null 2>&1; then
              echo "SUT is up."
              exit 0
            fi
            echo "Waiting for SUT (attempt $i)..."
            sleep 2
          done
          echo "SUT did not become ready in time."
          exit 1
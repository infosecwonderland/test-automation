name: Minimal Linting and SUT Startup

on:
  push:
    branches:
      - main
      - master
      - "**/feature/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  lint_and_requirements:
    name: Linting and Install Requirements
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python requirements (if any)
        run: |
          python -m pip install --upgrade pip
          if [ -f "requirements.txt" ]; then
            pip install -r requirements.txt
          else
            echo "No top-level requirements.txt found; skipping global Python deps."
          fi

      - name: Install SUT dependencies
        run: |
          if [ -d "sut" ] && [ -f "sut/package.json" ]; then
            cd sut
            npm install
          else
            echo "No Node-based SUT with package.json found; skipping npm install."
          fi

  ui_tests_playwright:
    name: UI Tests (Playwright)
    runs-on: ubuntu-latest
    needs: lint_and_requirements

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install SUT dependencies
        run: |
          cd sut
          npm install

      - name: Install Playwright dependencies
        working-directory: ui-tests/playwright
        run: |
          npm install
          npx playwright install --with-deps

      - name: Run Playwright tests
        working-directory: ui-tests/playwright
        env:
          CI: true
        run: |
          npx playwright test --reporter=line

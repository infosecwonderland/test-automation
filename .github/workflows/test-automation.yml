name: Test Automation Pipeline

on:
  push:
    branches:
      - main
      - master
      - "**/feature/**"
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  test:
    name: Run All Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Runtimes ────────────────────────────────────────────────────────────

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      # ── Dependencies ────────────────────────────────────────────────────────

      - name: Install SUT dependencies
        run: cd sut && npm install

      - name: Install Playwright dependencies
        working-directory: ui-tests/playwright
        run: |
          npm install
          npx playwright install --with-deps

      - name: Install PyTest dependencies
        working-directory: api-tests/pytest
        run: pip install -r requirements.txt

      # ── Start SUT (shared across all test suites) ───────────────────────────

      - name: Start SUT
        run: |
          node sut/index.js &
          for i in {1..30}; do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "SUT is ready on port 3000"
              break
            fi
            echo "Waiting for SUT (attempt $i)..."
            sleep 1
          done

      # ── Test Suites ─────────────────────────────────────────────────────────

      - name: UI Tests (Playwright)
        working-directory: ui-tests/playwright
        run: npx playwright test --reporter=line

      - name: API Tests (PyTest)
        working-directory: api-tests/pytest
        run: python -m pytest -v

      - name: API Tests (Karate)
        working-directory: api-tests/karate
        run: mvn test -B

      # ── Stop SUT ─────────────────────────────────────────────────────────────

      - name: Stop SUT
        if: always()
        run: pkill -f "node sut/index.js" || true

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Products / Search - Demo Shop</title>
</head>
<body>
  <h1>Products / Search</h1>
  <p>This page represents the Search / Product listing screen.</p>

  <label>
    Search:
    <input id="search" type="text" placeholder="Search products..." />
  </label>

  <ul id="products"></ul>

  <script>
    async function loadProducts(filterText) {
      const list = document.getElementById('products');
      list.innerHTML = '';
      const res = await fetch('/products');
      const data = await res.json();
      const filtered = (filterText || '').trim().toLowerCase();
      const products = data.filter(p =>
        !filtered || String(p.name).toLowerCase().includes(filtered)
      );
      products.forEach(p => {
        const li = document.createElement('li');
        li.textContent = p.name + ' - $' + p.price;
        li.setAttribute('data-testid', 'product-item');
        const btn = document.createElement('button');
        btn.textContent = 'Add to cart';
        btn.setAttribute('data-testid', 'add-to-cart-button');
        btn.addEventListener('click', async () => {
          await fetch('/cart/add', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ productId: p.id, quantity: 1 }),
          });
          window.location.href = '/cart';
        });
        li.appendChild(btn);
        list.appendChild(li);
      });
    }

    const searchInput = document.getElementById('search');
    if (searchInput) {
      searchInput.addEventListener('input', (e) => {
        loadProducts(e.target.value);
      });
    }

    loadProducts('');
  </script>
</body>
</html>
